<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="self-style.css">
    <title>Self - Modal</title>
  </head>
  <body>
    <div class="modal">
        <div class="icon">!</div>
        <div class="container">
            <div class="header">Are you a Really Cool Guy?
            <button class="close-button">X</button></div>
            <div class="text">A really cool guy is someone who does really cool things. He treats everyone 
                well, is super respectful but also has a general air of confidence without 
                arrogance. Everyone wants to be him and ladies want to be wih him!</div>
            <button class="yes">Yes</button>
            <button class="no">No</button>
        </div>
    </div>
  </body>
</html>
